{% set bd_obj = bd_for_icon if bd_for_icon is defined else bd %}
{% set t = (bd_obj.type if bd_obj else '')|lower %}
{% if 'fruit' in t %}
<svg class="bd-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <circle cx="50" cy="58" r="28" fill="none" stroke="#ffb347" stroke-width="7"/>
  <path d="M50 28 C36 10 22 22 32 38" fill="none" stroke="#76c893" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M50 28 C64 10 78 22 68 38" fill="none" stroke="#76c893" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="50" y1="26" x2="50" y2="42" stroke="#76c893" stroke-width="7" stroke-linecap="round"/>
</svg>
{% elif 'root' in t %}
<svg class="bd-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <polygon points="50,22 30,80 70,80" fill="none" stroke="#d48c2f" stroke-width="7" stroke-linejoin="round"/>
  <path d="M50 20 C38 8 26 18 34 32" fill="none" stroke="#76c893" stroke-width="7" stroke-linecap="round"/>
  <path d="M50 20 C62 8 74 18 66 32" fill="none" stroke="#76c893" stroke-width="7" stroke-linecap="round"/>
  <line x1="50" y1="20" x2="50" y2="46" stroke="#76c893" stroke-width="7" stroke-linecap="round"/>
  <path d="M50 60 L44 70" stroke="#d48c2f" stroke-width="6" stroke-linecap="round"/>
  <path d="M50 62 L56 72" stroke="#d48c2f" stroke-width="6" stroke-linecap="round"/>
</svg>
{% elif 'leaf' in t %}
<svg class="bd-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <path d="M50 12 Q14 54 44 88 Q86 54 50 12" fill="#1f6f4a" stroke="#76c893" stroke-width="6" stroke-linejoin="round"/>
  <line x1="50" y1="18" x2="50" y2="82" stroke="#b8f2c8" stroke-width="5" stroke-linecap="round"/>
  <path d="M50 42 C40 46 34 56 32 66" fill="none" stroke="#b8f2c8" stroke-width="4" stroke-linecap="round"/>
  <path d="M50 46 C60 50 66 60 68 70" fill="none" stroke="#b8f2c8" stroke-width="4" stroke-linecap="round"/>
</svg>
{% elif 'flower' in t %}
<svg class="bd-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <circle cx="50" cy="50" r="16" fill="none" stroke="#ffd166" stroke-width="6"/>
  <circle cx="50" cy="20" r="12" fill="none" stroke="#ffd166" stroke-width="6"/>
  <circle cx="50" cy="80" r="12" fill="none" stroke="#ffd166" stroke-width="6"/>
  <circle cx="20" cy="50" r="12" fill="none" stroke="#ffd166" stroke-width="6"/>
  <circle cx="80" cy="50" r="12" fill="none" stroke="#ffd166" stroke-width="6"/>
  <path d="M50 50 C42 44 34 44 28 48" fill="none" stroke="#76c893" stroke-width="6" stroke-linecap="round"/>
  <path d="M50 50 C58 44 66 44 72 48" fill="none" stroke="#76c893" stroke-width="6" stroke-linecap="round"/>
</svg>
{% elif 'rest' in t or 'barren' in t %}
<svg class="bd-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <circle cx="50" cy="50" r="36" fill="none" stroke="#b0b8c2" stroke-width="6"/>
  <line x1="20" y1="20" x2="80" y2="80" stroke="#ff6b6b" stroke-width="8"/>
</svg>
{% else %}
<svg class="bd-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <circle cx="50" cy="50" r="30" fill="none" stroke="#9fb3c8" stroke-width="6"/>
</svg>
{% endif %}
