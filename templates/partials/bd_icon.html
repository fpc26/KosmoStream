{% set bd_obj = bd_for_icon if bd_for_icon is defined else bd %}
{% set t = (bd_obj.type if bd_obj else '')|lower %}
{% if 'fruit' in t %}
<svg class="bd-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <circle cx="50" cy="64" r="28" fill="none" stroke="#ffb347" stroke-width="7"/>
  <path d="M50 22 C36 8 22 22 32 34" fill="none" stroke="#76c893" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M50 22 C64 8 78 22 68 34" fill="none" stroke="#76c893" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="50" y1="20" x2="50" y2="40" stroke="#76c893" stroke-width="7" stroke-linecap="round"/>
</svg>
{% elif 'root' in t %}
<svg class="bd-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <polygon points="50,78 32,36 68,36" fill="none" stroke="#d48c2f" stroke-width="7" stroke-linejoin="round"/>
  <path d="M50 20 C38 10 26 18 34 30" fill="none" stroke="#76c893" stroke-width="7" stroke-linecap="round"/>
  <path d="M50 20 C62 10 74 18 66 30" fill="none" stroke="#76c893" stroke-width="7" stroke-linecap="round"/>
  <line x1="50" y1="20" x2="50" y2="40" stroke="#76c893" stroke-width="7" stroke-linecap="round"/>
</svg>
{% elif 'leaf' in t %}
<svg class="bd-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <path d="M50 12 Q14 54 44 88 Q86 54 50 12" fill="#1f6f4a" stroke="#76c893" stroke-width="6" stroke-linejoin="round"/>
  <line x1="50" y1="18" x2="50" y2="82" stroke="#b8f2c8" stroke-width="5" stroke-linecap="round"/>
  <path d="M50 42 C40 46 34 56 32 66" fill="none" stroke="#b8f2c8" stroke-width="4" stroke-linecap="round"/>
  <path d="M50 46 C60 50 66 60 68 70" fill="none" stroke="#b8f2c8" stroke-width="4" stroke-linecap="round"/>
</svg>
{% elif 'flower' in t %}
<svg class="bd-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <circle cx="50" cy="50" r="13" fill="#ffd166" stroke="#ffd166" stroke-width="3"/>
  <ellipse cx="50" cy="26" rx="10" ry="18" fill="none" stroke="#ffd166" stroke-width="5" transform="rotate(0 50 50)"/>
  <ellipse cx="50" cy="26" rx="10" ry="18" fill="none" stroke="#ffd166" stroke-width="5" transform="rotate(60 50 50)"/>
  <ellipse cx="50" cy="26" rx="10" ry="18" fill="none" stroke="#ffd166" stroke-width="5" transform="rotate(120 50 50)"/>
  <ellipse cx="50" cy="26" rx="10" ry="18" fill="none" stroke="#ffd166" stroke-width="5" transform="rotate(180 50 50)"/>
  <ellipse cx="50" cy="26" rx="10" ry="18" fill="none" stroke="#ffd166" stroke-width="5" transform="rotate(240 50 50)"/>
  <ellipse cx="50" cy="26" rx="10" ry="18" fill="none" stroke="#ffd166" stroke-width="5" transform="rotate(300 50 50)"/>
</svg>
{% elif 'rest' in t or 'barren' in t %}
<svg class="bd-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <circle cx="50" cy="50" r="36" fill="none" stroke="#b0b8c2" stroke-width="6"/>
  <line x1="20" y1="20" x2="80" y2="80" stroke="#ff6b6b" stroke-width="8"/>
</svg>
{% else %}
<svg class="bd-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <circle cx="50" cy="50" r="30" fill="none" stroke="#9fb3c8" stroke-width="6"/>
</svg>
{% endif %}
