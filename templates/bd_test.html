<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>BD Icon Test</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#0c1020; color:#e9edf5; padding:2rem; }
    .bd-card { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:1rem; margin-bottom:1rem; }
  </style>
</head>
<body>
  <h1 class="mb-4">BD Icon Gallery</h1>
  <div class="row g-3">
    {% for item in samples %}
    <div class="col-12 col-sm-6 col-lg-4">
      <div class="bd-card d-flex align-items-center gap-3">
        <div>{% set bd_for_icon = item %}{% include 'partials/bd_icon.html' with context %}</div>
        <div>
          <div class="fw-bold text-capitalize">{{ item.type }}</div>
          <div class="small text-secondary">{{ item.phase }}</div>
          <div class="small">{{ item.activities }}</div>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</body>
</html>
